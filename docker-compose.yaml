services:
  tarefas:
    build:
      context: .
    ports:
      - "8005:8000"
    command: "-e main:APP"
  notificacoes:
    build:
      context: .
    command: "-e notificacao:APP_NOTIFICACAO"
  gateway:
    build:
      dockerfile: Dockerfile.nginx
      context: .
    ports:
      - "80:8002"
  